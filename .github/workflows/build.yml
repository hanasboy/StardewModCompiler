name: Build Stardew Valley Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create Mock Project & Add Dependencies
        run: |
          # 1. Tạo project class library mới bằng .NET 6
          dotnet new classlib -n SmartEconomyMod -f net6.0
          
          # 2. Cài đặt bộ công cụ build mod chính thức
          cd SmartEconomyMod
          dotnet add package Pathoschild.Stardew.ModBuildConfig --version 4.1.1

          # 3. Tạo thư mục game giả lập và di chuyển file DLL của huynh vào đó
          mkdir -p ../mock-game
          mv "../Stardew Valley.dll" ../mock-game/

          # 4. Tạo file csproj.user bắt buộc bộ build nhận thư mục ảo làm thư mục game
          echo '<Project><PropertyGroup><GamePath>../mock-game</GamePath></PropertyGroup></Project>' > SmartEconomyMod.csproj.user

          # 5. Dọn dẹp file mặc định và đưa code chính của huynh vào project
          cd ..
          rm SmartEconomyMod/Class1.cs
          mv ModEntry.cs SmartEconomyMod/

      - name: Build Mod DLL
        run: |
          cd SmartEconomyMod
          # Thực hiện build với cấu hình bỏ qua tạo file Zip game gốc
          dotnet build -c Release /p:EnableModZip=false

      - name: Upload Finished DLL
        uses: actions/upload-artifact@v4
        with:
          name: SmartEconomyMod-Artifact
          path: SmartEconomyMod/bin/Release/net6.0/SmartEconomyMod.dll
