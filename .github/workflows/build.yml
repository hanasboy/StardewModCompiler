name: Build Stardew Valley Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Create Clean Project & Manual Reference
        run: |
          # 1. Tạo thư mục project mới
          mkdir -p SmartEconomyMod
          cd SmartEconomyMod

          # 2. Tự thiết kế file csproj chuẩn .NET 6 để không bị SMAPI quét lỗi dò tìm game
          cat << 'EOF' > SmartEconomyMod.csproj
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net6.0</TargetFramework>
              <ImplicitUsings>disable</ImplicitUsings>
              <Nullable>disable</Nullable>
            </PropertyGroup>

            <ItemGroup>
              <Reference Include="StardewValley">
                <HintPath>../StardewValley.dll</HintPath>
                <Private>false</Private>
              </Reference>
              <Reference Include="StardewModdingAPI">
                <HintPath>../StardewValley.dll</HintPath>
                <Private>false</Private>
              </Reference>
            </ItemGroup>
          </Project>
          EOF

          # 3. Đồng bộ tệp game gốc của huynh (hỗ trợ cả viết liền và dấu cách)
          cd ..
          if [ -f "Stardew Valley.dll" ]; then
            mv "Stardew Valley.dll" StardewValley.dll
          fi

          # 4. Đưa file mã nguồn ModEntry.cs vào đúng vị trí biên dịch
          mv ModEntry.cs SmartEconomyMod/

      - name: Build Mod DLL
        run: |
          cd SmartEconomyMod
          # Tiến hành biên dịch trực tiếp ra file DLL thành phẩm
          dotnet build -c Release

      - name: Upload Finished DLL
        uses: actions/upload-artifact@v4
        with:
          name: SmartEconomyMod-Artifact
          path: SmartEconomyMod/bin/Release/net6.0/SmartEconomyMod.dll
