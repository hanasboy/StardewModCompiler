name: Build Stardew Valley Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Create Mock Project & Add Dependencies
        run: |
          # 1. Tạo project class library bằng template mặc định (sẽ tự động chọn net8.0 để không bị lỗi lệnh)
          dotnet new classlib -n SmartEconomyMod
          
          # 2. Cài đặt bộ công cụ build mod chính thức bản tương thích ổn định nhất
          cd SmartEconomyMod
          dotnet add package Pathoschild.Stardew.ModBuildConfig --version 4.1.1

          # 3. Ép cấu hình project về net6.0 để tương thích với Stardew Valley DLL của huynh
          sed -i 's/<TargetFramework>.*<\/TargetFramework>/<TargetFramework>net6.0<\/TargetFramework>/g' SmartEconomyMod.csproj

          # 4. Tạo thư mục game giả lập và đưa file DLL của huynh vào
          mkdir -p ../mock-game
          if [ -f "../Stardew Valley.dll" ]; then
            mv "../Stardew Valley.dll" ../mock-game/
          elif [ -f "../StardewValley.dll" ]; then
            mv "../StardewValley.dll" ../mock-game/"Stardew Valley.dll"
          fi

          # 5. Tạo file user cấu hình đường dẫn game ảo
          echo '<Project><PropertyGroup><GamePath>../mock-game</GamePath></PropertyGroup></Project>' > SmartEconomyMod.csproj.user

          # 6. Dọn dẹp file mặc định và đưa code chính của huynh vào project
          cd ..
          rm -f SmartEconomyMod/Class1.cs
          mv ModEntry.cs SmartEconomyMod/

      - name: Build Mod DLL
        run: |
          cd SmartEconomyMod
          # Thực hiện build với cấu hình bỏ qua tạo file Zip game gốc
          dotnet build -c Release /p:EnableModZip=false

      - name: Upload Finished DLL
        uses: actions/upload-artifact@v4
        with:
          name: SmartEconomyMod-Artifact
          path: SmartEconomyMod/bin/Release/net6.0/SmartEconomyMod.dll
