name: Build Stardew Valley Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Create Mock Project & Add Dependencies
        run: |
          # 1. Tạo project class library mới bằng template mặc định
          dotnet new classlib -n SmartEconomyMod
          
          # 2. Cài đặt bộ công cụ build mod chính thức bản 4.1.1
          cd SmartEconomyMod
          dotnet add package Pathoschild.Stardew.ModBuildConfig --version 4.1.1

          # 3. Ép cấu hình project về net6.0 để tương thích với game
          sed -i 's/<TargetFramework>.*<\/TargetFramework>/<TargetFramework>net6.0<\/TargetFramework>/g' SmartEconomyMod.csproj

          # 4. Tạo thư mục game giả lập ở cấp ngoài song song với project
          mkdir -p ../mock-game

          # 5. Copy file DLL của huynh vào và ép tên chuẩn "StardewValley.dll" (viết liền)
          cp ../"Stardew Valley.dll" ../mock-game/StardewValley.dll || cp ../StardewValley.dll ../mock-game/StardewValley.dll || cp ../stardew*.dll ../mock-game/StardewValley.dll || true
          
          # 6. MẸO QUYẾT ĐỊNH: Tạo file chạy giả lập "StardewValley" không đuôi để vượt qua bộ check của SMAPI trên Linux
          touch ../mock-game/StardewValley
          chmod +x ../mock-game/StardewValley

          # Hiển thị log kiểm tra để huynh thấy cấu trúc chuẩn trước khi build
          echo "=== Danh sách file trong mock-game ==="
          ls -la ../mock-game/

          # 7. Tạo file user cấu hình đường dẫn game ép SMAPI nhận thư mục ảo
          echo '<Project><PropertyGroup><GamePath>../mock-game</GamePath></PropertyGroup></Project>' > SmartEconomyMod.csproj.user

          # 8. Dọn dẹp file mặc định và đưa code chính của huynh vào project
          cd ..
          rm -f SmartEconomyMod/Class1.cs
          mv ModEntry.cs SmartEconomyMod/

      - name: Build Mod DLL
        run: |
          cd SmartEconomyMod
          # Thực hiện build và tắt tính năng đóng gói zip (vì không có game thật)
          dotnet build -c Release /p:EnableModZip=false

      - name: Upload Finished DLL
        uses: actions/upload-artifact@v4
        with:
          name: SmartEconomyMod-Artifact
          path: SmartEconomyMod/bin/Release/net6.0/SmartEconomyMod.dll
