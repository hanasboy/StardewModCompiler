name: Build Stardew Valley Mod

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 6.0.x

    - name: Create Fake Game Folder
      run: |
        mkdir D:\FakeGame
        # Đệ đã thêm dấu ngoặc kép để tạo file có khoảng trắng chuẩn game gốc rồi đây Sư huynh!
        echo "" > "D:\FakeGame\Stardew Valley.dll"
        echo "" > D:\FakeGame\StardewModdingAPI.exe

    - name: Build Mod
      run: |
        dotnet new classlib -n SmartNPCAndEconomyMod --force
        copy ModEntry.cs SmartNPCAndEconomyMod\
        cd SmartNPCAndEconomyMod
        dotnet add package Pathoschild.Stardew.ModBuildConfig
        
        # Ép buộc bộ build nhận đường dẫn game giả lập
        dotnet build -c Release /p:GamePath="D:\FakeGame"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MySmartModDLL
        path: SmartNPCAndEconomyMod/bin/Release/net6.0/SmartNPCAndEconomyMod.dll
