name: Build Stardew Valley Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            8.0.x

      - name: Create Project & Force Reference
        run: |
          # 1. Tạo project class library mới bằng template mặc định
          dotnet new classlib -n SmartEconomyMod
          
          # 2. Di chuyển vào thư mục project
          cd SmartEconomyMod

          # 3. Cài đặt gói ModBuildConfig bản 4.1.1
          dotnet add package Pathoschild.Stardew.ModBuildConfig --version 4.1.1

          # 4. Ép TargetFramework về net6.0
          sed -i 's/<TargetFramework>.*<\/TargetFramework>/<TargetFramework>net6.0<\/TargetFramework>/g' SmartEconomyMod.csproj

          # 5. MẸO QUYẾT ĐỊNH: Chèn cấu hình ép tắt tính năng tự dò tìm game, chỉ định đích danh file DLL của huynh
          # Chúng ta sẽ cấu hình để project tham chiếu trực tiếp tới file DLL huynh tải lên ở thư mục gốc.
          sed -i '/<\/PropertyGroup>/i \\    <EnableGameAutodetect>false<\/EnableGameAutodetect>\n    <HasGameBinaries>false<\/HasGameBinaries>' SmartEconomyMod.csproj
          
          # Tìm file DLL của huynh (bất kể tên có dấu cách hay không) và copy thẳng vào thư mục project để làm Reference thủ công
          cp ../"Stardew Valley.dll" ./StardewValley.dll || cp ../StardewValley.dll ./StardewValley.dll || cp ../stardew*.dll ./StardewValley.dll || true

          # Thêm dòng tham chiếu trực tiếp file DLL này vào file csproj
          sed -i '/<\/Project>/i \\  <ItemGroup>\n    <Reference Include="StardewValley">\n      <HintPath>StardewValley.dll<\/HintPath>\n      <Private>false<\/Private>\n    <\/Reference>\n  <\/ItemGroup>' SmartEconomyMod.csproj

          # 6. Dọn dẹp file mặc định và đưa code chính của huynh vào project
          cd ..
          rm -f SmartEconomyMod/Class1.cs
          mv ModEntry.cs SmartEconomyMod/

      - name: Build Mod DLL
        run: |
          cd SmartEconomyMod
          # Thực hiện build với cấu hình bỏ qua tạo file Zip game gốc và bỏ qua kiểm tra thư mục cài game
          dotnet build -c Release /p:EnableModZip=false /p:IgnoreMaxMissingArtifacts=true

      - name: Upload Finished DLL
        uses: actions/upload-artifact@v4
        with:
          name: SmartEconomyMod-Artifact
          path: SmartEconomyMod/bin/Release/net6.0/SmartEconomyMod.dll
