name: Build Stardew Valley Mod
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 6.0.x

      - name: Create Mock Project & Add Dependencies
        run: |
          # 1. Tạo project class library mới bằng .NET 6
          dotnet new classlib -n SmartEconomyMod -f net6.0
          
          # 2. Cài đặt bộ công cụ build mod chính thức (Đã bao gồm StardewValley và MonoGame)
          cd SmartEconomyMod
          dotnet add package Pathoschild.Stardew.ModBuildConfig --version 4.1.1

          # 3. Dọn dẹp file mặc định và di chuyển code của huynh vào đúng vị trí
          cd ..
          rm SmartEconomyMod/Class1.cs
          mv ModEntry.cs SmartEconomyMod/

      - name: Build Mod DLL
        run: |
          cd SmartEconomyMod
          dotnet build -c Release

      - name: Upload Finished DLL
        uses: actions/upload-artifact@v4
        with:
          name: SmartEconomyMod-Artifact
          path: SmartEconomyMod/bin/Release/net6.0/SmartEconomyMod.dll
